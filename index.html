<!DOCTYPE html>
<html lang="eng">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Instagram</title>
  </head>
  <body>
    <div class="instagram-wrapper">
      <div class="instagram-phone">
        <img src="instagram-phone.png" alt="celular" />
      </div>
      <div class="instagram-continue">
        <div class="group">
          <img
            src="Instagram-logo.png"
            class="instagram-logo"
            alt="logo do instagram"
          />
          <div class="profile-pic">
            <img src="profile-pic.jpg" alt="foto de perfil" />
          </div>
          <a href="#" class="instagram-login">continue como My_Name_Is_Baylo</a>
          <a href="#" class="instagram-logout">remover conta</a>
        </div>
        <div class="group">
          <p class="not-account">Não é My_Name_Is_Baylo?</p>
          <p class="not-account">
            <span class="link-blue">Alterar conta</span>
            ou
            <span class="link-blue">É novo? Crie uma conta e inscreva-se!</span>
          </p>
        </div>
        <div class="get-the-app">
          <p class="get-app">Baixe o aplicativo</p>
        </div>
        <div class="download">
          <a href="#" class="app-download"></a>
          <a href="#" class="app-download"></a>
        </div>
      </div>
    </div>
  </body>
</html>
